<svg viewBox="0 0 800 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.mono { font-family: 'SFMono-Regular','Consolas','Liberation Mono','Menlo',monospace; }
.kw   { fill: #ff79c6; }
.fn   { fill: #50fa7b; }
.str  { fill: #f1fa8c; }
.cm   { fill: #6272a4; }
.ty   { fill: #8be9fd; }
.pk   { fill: #bd93f9; }
.pl   { fill: #f8f8f2; }
.ln   { fill: #3d4455; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.blink { animation: blink 1.1s step-end infinite; }
</style>
</defs>

<!-- Background -->
<rect width="860" height="180" fill="#0d1117" rx="8"/>

<!-- Top accent -->
<rect width="860" height="3" fill="#00d4ff" rx="2"/>
<!-- Bottom accent -->
<rect y="177" width="860" height="3" fill="#ff4d6d" rx="2"/>

<!-- Title bar -->
<rect width="860" height="30" fill="#161b22" rx="8"/>
<rect y="16" width="860" height="14" fill="#161b22"/>

<!-- Traffic lights -->
<circle cx="22" cy="15" r="5.5" fill="#ff5f56"/>
<circle cx="39" cy="15" r="5.5" fill="#ffbd2e"/>
<circle cx="56" cy="15" r="5.5" fill="#27c93f"/>

<!-- Active tab: main.go -->
<rect x="74" y="4" width="72" height="22" fill="#0d1117" rx="3"/>
<text x="110" y="19" class="mono" font-size="11" fill="#8be9fd" text-anchor="middle">main.go</text>

<!-- Inactive tab: sre.go -->
<rect x="152" y="6" width="60" height="18" fill="#0d1117" fill-opacity="0.4" rx="3"/>
<text x="182" y="19" class="mono" font-size="11" fill="#4d5566" text-anchor="middle">sre.go</text>

<!-- Build passing badge -->
<rect x="698" y="5" width="148" height="20" fill="#1a3a22" rx="10" stroke="#238636" stroke-width="1"/>
<text x="772" y="19" class="mono" font-size="11" fill="#3fb950" text-anchor="middle">● build: passing</text>

<!-- Vertical divider -->
<line x1="490" y1="30" x2="490" y2="178" stroke="#21262d" stroke-width="1"/>

<!-- ═══════════════ LEFT: GO CODE ═══════════════ -->

<!-- L1: package main -->
<text x="30" y="51" class="mono ln" font-size="11" text-anchor="end">1</text>
<text x="42" y="51" class="mono kw" font-size="13">package</text>
<text x="111" y="51" class="mono pl" font-size="13"> main</text>

<!-- L2: blank -->
<text x="30" y="67" class="mono ln" font-size="11" text-anchor="end">2</text>

<!-- L3: import -->
<text x="30" y="83" class="mono ln" font-size="11" text-anchor="end">3</text>
<text x="42" y="83" class="mono kw" font-size="13">import</text>
<text x="95" y="83" class="mono pk" font-size="13"> prom</text>
<text x="135" y="83" class="mono str" font-size="13"> "github.com/prometheus"</text>

<!-- L4: func main() { -->
<text x="30" y="99" class="mono ln" font-size="11" text-anchor="end">4</text>
<text x="42" y="99" class="mono kw" font-size="13">func</text>
<text x="74" y="99" class="mono fn" font-size="13"> main</text>
<text x="116" y="99" class="mono pl" font-size="13">() {</text>

<!-- L5: sre.Deploy("production") -->
<text x="30" y="115" class="mono ln" font-size="11" text-anchor="end">5</text>
<text x="62" y="115" class="mono ty" font-size="13">sre</text>
<text x="86" y="115" class="mono pl" font-size="13">.</text>
<text x="93" y="115" class="mono fn" font-size="13">Deploy</text>
<text x="144" y="115" class="mono pl" font-size="13">(</text>
<text x="151" y="115" class="mono str" font-size="13">"production"</text>
<text x="257" y="115" class="mono pl" font-size="13">)</text>

<!-- L6: closing + comment -->
<text x="30" y="131" class="mono ln" font-size="11" text-anchor="end">6</text>
<text x="42" y="131" class="mono pl" font-size="13">}</text>
<text x="57" y="131" class="mono cm" font-size="13">  // uptime: 99.97% | MTTR: 4.2m</text>

<!-- L7: terminal prompt -->
<text x="30" y="147" class="mono ln" font-size="11" text-anchor="end">7</text>
<text x="42" y="147" class="mono fn" font-size="13">$</text>
<text x="54" y="147" class="mono pl" font-size="13"> go run ./sre-agent</text>
<text x="206" y="147" class="mono cm" font-size="13"> — Anuj Tiwari</text>

<!-- Blinking cursor -->
<rect x="320" y="135" width="7" height="13" fill="#00d4ff" class="blink"/>

<!-- ═══════════════ RIGHT: SRE METRICS ═══════════════ -->

<!-- Section title -->
<text x="506" y="51" class="mono" font-size="11" fill="#8be9fd" font-weight="600">◉  SYSTEM RELIABILITY</text>

<!-- Horizontal rule -->
<line x1="502" y1="57" x2="852" y2="57" stroke="#21262d" stroke-width="1"/>

<!-- Metric rows -->
<!-- Row 1 -->
<text x="506" y="74" class="mono" font-size="11" fill="#4d5566">Uptime</text>
<text x="590" y="74" class="mono" font-size="11" fill="#50fa7b">99.97%</text>
<text x="656" y="74" class="mono" font-size="11" fill="#4d5566">P99 Latency</text>
<text x="754" y="74" class="mono" font-size="11" fill="#50fa7b">&lt;200ms</text>

<!-- Row 2 -->
<text x="506" y="91" class="mono" font-size="11" fill="#4d5566">Error Rate</text>
<text x="590" y="91" class="mono" font-size="11" fill="#50fa7b">0.003%</text>
<text x="656" y="91" class="mono" font-size="11" fill="#4d5566">MTTR</text>
<text x="754" y="91" class="mono" font-size="11" fill="#50fa7b">4.2 min</text>

<!-- Row 3 -->
<text x="506" y="108" class="mono" font-size="11" fill="#4d5566">Deploys/wk</text>
<text x="590" y="108" class="mono" font-size="11" fill="#f1fa8c">8</text>
<text x="656" y="108" class="mono" font-size="11" fill="#4d5566">On-call</text>
<text x="754" y="108" class="mono" font-size="11" fill="#50fa7b">✓ quiet</text>

<!-- Row 4 -->
<text x="506" y="125" class="mono" font-size="11" fill="#4d5566">SLO Status</text>
<text x="590" y="125" class="mono" font-size="11" fill="#50fa7b">✓ Met</text>
<text x="656" y="125" class="mono" font-size="11" fill="#4d5566">Err Budget</text>
<text x="754" y="125" class="mono" font-size="11" fill="#f1fa8c">91.2% left</text>

<!-- Horizontal rule -->
<line x1="502" y1="135" x2="852" y2="135" stroke="#21262d" stroke-width="1"/>

<!-- Tech stack badges -->
<!-- Go -->
<rect x="506" y="143" width="36" height="17" fill="#0a1e2e" rx="4" stroke="#00acd7" stroke-width="0.8"/>
<text x="524" y="155" class="mono" font-size="10" fill="#00acd7" text-anchor="middle">Go</text>

<!-- K8s -->
<rect x="548" y="143" width="36" height="17" fill="#0a1020" rx="4" stroke="#326ce5" stroke-width="0.8"/>
<text x="566" y="155" class="mono" font-size="10" fill="#326ce5" text-anchor="middle">K8s</text>

<!-- Prometheus -->
<rect x="590" y="143" width="74" height="17" fill="#1e0f0a" rx="4" stroke="#e6522c" stroke-width="0.8"/>
<text x="627" y="155" class="mono" font-size="10" fill="#e6522c" text-anchor="middle">Prometheus</text>

<!-- Terraform -->
<rect x="670" y="143" width="64" height="17" fill="#120a1e" rx="4" stroke="#7b42bc" stroke-width="0.8"/>
<text x="702" y="155" class="mono" font-size="10" fill="#7b42bc" text-anchor="middle">Terraform</text>

<!-- GH Actions -->
<rect x="740" y="143" width="80" height="17" fill="#0a111e" rx="4" stroke="#2088ff" stroke-width="0.8"/>
